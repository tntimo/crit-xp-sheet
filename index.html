<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<script>if(location.protocol!=='file:'){var l=document.createElement('link');l.rel='manifest';l.href='manifest.json';document.head.appendChild(l);}</script>
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="XP Sheet">
<meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
<meta name="theme-color" media="(prefers-color-scheme: dark)"  content="#111111">
<title>Critical Based · XP Sheet</title>
<link rel="stylesheet" href="style.css">
</head>
<body x-data="app()" x-init="init()">

<div id="app" x-cloak>
  <header>
    <div class="header-top">
      <h1>&#9876; Critical Based &middot; XP Sheet</h1>
      <button class="lang-btn" @click="toggleLang()">
        <span x-text="langFlag"></span>
        <span x-text="lang.toUpperCase()"></span>
      </button>
    </div>
    <div class="char-strip">
      <span class="char-name" x-text="char.name ? char.name + (char.cls ? ' · ' + char.cls : '') : '&mdash;'"></span>
      <span class="char-level" x-text="char.name ? T('char_level') + ' ' + char.level : ''"></span>
    </div>
  </header>

  <nav>
    <button @click="view = 'setup'" :class="{ active: view === 'setup' }">
      <span class="nav-icon">&#129497;</span><span x-text="T('nav_setup')"></span>
    </button>
    <button @click="view = 'dashboard'" :class="{ active: view === 'dashboard' }">
      <span class="nav-icon">&#129518;</span><span x-text="T('nav_dash')"></span>
    </button>
    <button @click="view = 'log'" :class="{ active: view === 'log' }">
      <span class="nav-icon">&#9999;&#65039;</span><span x-text="T('nav_log')"></span>
    </button>
    <button @click="view = 'journal'" :class="{ active: view === 'journal' }">
      <span class="nav-icon">&#128220;</span><span x-text="T('nav_journal')"></span>
    </button>
  </nav>

  <main>
    <!-- CHARACTER SETUP -->
    <div class="view" :class="{ active: view === 'setup' }">
      <div class="setup-view">
        <div class="setup-card">
          <div class="section-title" x-text="T('char_info')"></div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" x-text="T('char_name')"></label>
              <input class="form-input" x-model="char.name" type="text" placeholder="Aragorn...">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" x-text="T('char_class')"></label>
              <input class="form-input" x-model="char.cls" type="text" placeholder="Ranger...">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" x-text="T('char_level_label')"></label>
              <input class="form-input" x-model.number="char.level" type="number" min="1" max="99" placeholder="1">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label class="form-label" x-text="T('starting_xp')"></label>
              <input class="form-input" x-model.number="char.startXp" type="number" placeholder="0" min="0">
            </div>
          </div>
          <button class="submit-btn" style="margin-top:14px;" @click="saveCharacter()" x-text="T('btn_save')"></button>
        </div>
        <div class="setup-card">
          <div class="section-title" x-text="T('char_manager')"></div>
          <button class="submit-btn" style="margin-bottom:12px;" @click="createCharacter()" x-text="T('btn_new_char')"></button>
          <div x-show="characters.length === 0" style="text-align:center;padding:20px 0;color:var(--text3);font-size:0.88rem;" x-text="T('no_characters')"></div>
          <template x-for="c in characters" :key="c.id">
            <div class="char-list-item" :class="{ active: c.id === activeCharId }">
              <div class="char-list-info" @click="switchCharacter(c.id)">
                <span class="char-list-name" x-text="c.name || '&mdash;'"></span>
                <span class="char-list-meta" x-text="(c.cls ? c.cls + ' · ' : '') + T('char_level') + ' ' + (c.level || 1)"></span>
              </div>
              <button class="char-list-delete" @click="deleteCharacter(c.id)" title="Delete">&#10005;</button>
            </div>
          </template>
        </div>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div class="view" :class="{ active: view === 'dashboard' }">
      <div class="dashboard">
        <div class="xp-total-card">
          <div class="xp-total-label" x-text="T('total_xp')"></div>
          <div class="xp-total-number" x-text="totalXP"></div>
        </div>
        <div class="stats-grid">
          <div class="stat-card maneuver">
            <div class="stat-card-label" x-text="T('cat_maneuver')"></div>
            <div class="stat-card-value" x-text="xpByCategory('maneuver')"></div>
          </div>
          <div class="stat-card save">
            <div class="stat-card-label" x-text="T('cat_save')"></div>
            <div class="stat-card-value" x-text="xpByCategory('save')"></div>
          </div>
          <div class="stat-card crit-done">
            <div class="stat-card-label" x-text="T('cat_crit_done')"></div>
            <div class="stat-card-value" x-text="xpByCategory('crit-done')"></div>
          </div>
          <div class="stat-card crit-recv">
            <div class="stat-card-label" x-text="T('cat_crit_recv')"></div>
            <div class="stat-card-value" x-text="xpByCategory('crit-recv')"></div>
          </div>
          <div class="stat-card kill">
            <div class="stat-card-label" x-text="T('cat_kill')"></div>
            <div class="stat-card-value" x-text="xpByCategory('kill')"></div>
          </div>
          <div class="stat-card spell">
            <div class="stat-card-label" x-text="T('cat_spell')"></div>
            <div class="stat-card-value" x-text="xpByCategory('spell')"></div>
          </div>
        </div>
        <button class="submit-btn" @click="view = 'log'" x-text="T('btn_log_xp')"></button>
      </div>
    </div>

    <!-- LOG XP -->
    <div class="view" :class="{ active: view === 'log' }">
      <div class="log-view">
        <div class="section-title" x-text="T('choose_action')"></div>
        <div class="action-grid">
          <button class="action-btn" @click="openModal('maneuver')">
            <span class="btn-icon">&#129336;</span>
            <span class="btn-label" x-text="T('cat_maneuver')"></span>
          </button>
          <button class="action-btn" @click="openModal('save')">
            <span class="btn-icon">&#128737;&#65039;</span>
            <span class="btn-label" x-text="T('cat_save')"></span>
          </button>
          <button class="action-btn" @click="openModal('crit-done')">
            <span class="btn-icon">&#127919;</span>
            <span class="btn-label" x-text="T('cat_crit_done')"></span>
          </button>
          <button class="action-btn" @click="openModal('crit-recv')">
            <span class="btn-icon">&#129656;</span>
            <span class="btn-label" x-text="T('cat_crit_recv')"></span>
          </button>
          <button class="action-btn" @click="openModal('kill')">
            <span class="btn-icon">&#128128;</span>
            <span class="btn-label" x-text="T('cat_kill')"></span>
          </button>
          <button class="action-btn" @click="openModal('spell')">
            <span class="btn-icon">&#10024;</span>
            <span class="btn-label" x-text="T('cat_spell')"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- JOURNAL -->
    <div class="view" :class="{ active: view === 'journal' }">
      <div class="journal-view">
        <div class="filter-row">
          <button class="filter-chip" :class="{ active: filter === 'all' }"       @click="filter = 'all'"       x-text="T('filter_all')"></button>
          <button class="filter-chip" :class="{ active: filter === 'maneuver' }"  @click="filter = 'maneuver'" >&#129336; <span x-text="T('cat_maneuver')"></span></button>
          <button class="filter-chip" :class="{ active: filter === 'save' }"      @click="filter = 'save'"     >&#128737;&#65039; <span x-text="T('cat_save')"></span></button>
          <button class="filter-chip" :class="{ active: filter === 'crit-done' }" @click="filter = 'crit-done'">&#127919; <span x-text="T('cat_crit_done')"></span></button>
          <button class="filter-chip" :class="{ active: filter === 'crit-recv' }" @click="filter = 'crit-recv'">&#129656; <span x-text="T('cat_crit_recv')"></span></button>
          <button class="filter-chip" :class="{ active: filter === 'kill' }"      @click="filter = 'kill'"     >&#128128; <span x-text="T('cat_kill')"></span></button>
          <button class="filter-chip" :class="{ active: filter === 'spell' }"     @click="filter = 'spell'"    >&#10024; <span x-text="T('cat_spell')"></span></button>
        </div>
        <div x-show="filteredLog.length === 0" class="journal-empty" x-text="T('no_entries')"></div>
        <template x-for="entry in filteredLog" :key="entry.id">
          <div class="journal-entry" :class="entry.cat">
            <div class="entry-top">
              <span class="entry-cat" x-text="catLabel(entry.cat)"></span>
              <span class="entry-xp"  x-text="entryXpStr(entry)"></span>
            </div>
            <div class="entry-desc" x-text="renderDesc(entry.descData)"></div>
            <div class="entry-note" x-show="entry.note" x-text="entry.note"></div>
            <div class="entry-time" x-text="entryTime(entry)"></div>
            <button class="entry-delete" @click="deleteEntry(entry.id)">&#10005;</button>
          </div>
        </template>
      </div>
    </div>
  </main>
  <footer class="app-footer">
    <button class="footer-link" @click="privacyOpen = true" x-text="T('privacy_title')"></button>
    <span class="footer-sep">·</span>
    <a class="footer-link" href="https://github.com/tntimo/crit-xp-sheet" target="_blank" rel="noopener">GitHub</a>
    <span class="footer-sep">·</span>
    <a class="footer-link" href="LICENSE" target="_blank">© 2026 CC BY-NC 4.0</a>
  </footer>
</div>

<!-- MODAL -->
<div class="modal-backdrop" x-show="modal.open" x-cloak @click.self="closeModal()">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" x-text="modalTitle"></span>
      <button class="modal-close" @click="closeModal()">&#10005;</button>
    </div>

    <!-- Maneuver -->
    <div x-show="modal.type === 'maneuver'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group">
            <label class="form-label" x-text="T('lbl_difficulty')"></label>
            <div class="opt-btn-grid">
              <template x-for="d in maneuverDiffs" :key="d.v">
                <button class="opt-btn" :class="{ selected: modal.diff === d.v }" @click="modal.diff = d.v">
                  <span x-text="T(d.k)"></span>
                </button>
              </template>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" x-text="T('lbl_risk')"></label>
            <div class="opt-btn-group">
              <template x-for="r in maneuverRisks" :key="r.v">
                <button class="opt-btn" style="flex:1;" :class="{ selected: modal.risk === r.v }" @click="modal.risk = r.v">
                  <span x-text="T(r.k)"></span>
                </button>
              </template>
            </div>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Save -->
    <div x-show="modal.type === 'save'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group">
            <label class="form-label" x-text="T('lbl_save_score')"></label>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;margin-bottom:8px;">
              <template x-for="v in [40,60,80,100,120,140,160,180]" :key="v">
                <button class="opt-btn" :class="{ selected: modal.saveScore === v }" @click="modal.saveScore = v" x-text="String(v)"></button>
              </template>
            </div>
            <div style="display:flex;align-items:center;gap:8px;">
              <label class="form-label" style="margin:0;white-space:nowrap;" x-text="T('lbl_difficulty')"></label>
              <input class="form-input" x-model.number="modal.saveScore" type="number" min="1" max="9999" placeholder="...">
            </div>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Crit Done -->
    <div x-show="modal.type === 'crit-done'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group">
            <label class="form-label" x-text="T('lbl_crit_grade')"></label>
            <div style="display:flex;gap:5px;">
              <template x-for="g in ['A','B','C','D','E','F']" :key="g">
                <button class="opt-btn" style="flex:1;" :class="{ selected: modal.grade === g }" @click="modal.grade = g" x-text="g"></button>
              </template>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" x-text="T('lbl_opp_level')"></label>
            <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;">
              <template x-for="i in 21" :key="i">
                <button class="opt-btn" :class="{ selected: modal.oppLevel === String(i-1) }" :disabled="i === 1" @click="modal.oppLevel = String(i-1)" x-text="String(i-1)"></button>
              </template>
            </div>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Crit Received -->
    <div x-show="modal.type === 'crit-recv'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" x-text="T('lbl_crit_grade')"></label>
            <p style="font-size:0.78rem;color:var(--text2);margin-bottom:8px" x-text="T('foe_level_note')"></p>
            <div style="display:flex;gap:5px;">
              <template x-for="g in ['A','B','C','D','E','F']" :key="g">
                <button class="opt-btn" style="flex:1;" :class="{ selected: modal.gradeRecv === g }" @click="modal.gradeRecv = g" x-text="g"></button>
              </template>
            </div>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Kill -->
    <div x-show="modal.type === 'kill'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" x-text="T('lbl_opp_level')"></label>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px;">
              <template x-for="l in 20" :key="l">
                <button class="opt-btn" :class="{ selected: modal.killOpp === String(l) }" @click="modal.killOpp = String(l)" x-text="String(l)"></button>
              </template>
            </div>
            <p style="font-size:0.82rem;color:var(--text2);">
              <span x-text="T('your_level')"></span>: <strong x-text="char.level"></strong>
            </p>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Spell -->
    <div x-show="modal.type === 'spell'">
      <div style="display:flex;gap:12px;align-items:flex-start;">
        <div style="flex:1;min-width:0;">
          <div class="form-group">
            <label class="form-label" x-text="T('lbl_spell_level')"></label>
            <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:5px;">
              <template x-for="l in 11" :key="l">
                <button class="opt-btn" :class="{ selected: modal.spellLvl === l }" @click="modal.spellLvl = l" x-text="l === 11 ? '11+' : String(l)"></button>
              </template>
            </div>
          </div>
          <div class="form-group" style="margin-bottom:0;">
            <label class="form-label" x-text="T('lbl_caster_level')"></label>
            <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:5px;">
              <template x-for="l in 15" :key="l">
                <button class="opt-btn" :class="{ selected: modal.casterLvl === l }" @click="modal.casterLvl = l" x-text="String(l)"></button>
              </template>
            </div>
          </div>
        </div>
        <div style="width:88px;flex-shrink:0;padding-top:20px;">
          <div class="xp-preview" style="margin:0;">
            <div class="xp-preview-label" x-text="T('lbl_xp_earned')"></div>
            <div class="xp-preview-value" :class="{ zero: xpPreviewIsZero }" x-text="xpPreviewDisplay"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Note -->
    <div class="form-group">
      <label class="form-label" x-text="T('lbl_note')"></label>
      <input class="form-input" x-model="modal.note" type="text" placeholder="...">
    </div>

    <button class="submit-btn" @click="confirmXP()" :disabled="confirmDisabled" x-text="T('btn_confirm')"></button>
  </div>
</div>

<div class="toast" :class="{ show: toastShow }" x-text="toastMsg"></div>

<!-- CONSENT (must read before dismissing) -->
<div class="privacy-overlay" x-show="!consentGiven" x-cloak>
  <div class="privacy-sheet">
    <h2 x-text="T('privacy_title')"></h2>
    <ul>
      <li x-html="T('privacy_p1')"></li>
      <li x-html="T('privacy_p2')"></li>
      <li x-html="T('privacy_p3')"></li>
      <li x-html="T('privacy_p4')"></li>
    </ul>
    <p class="privacy-footer" x-text="T('privacy_footer')"></p>
    <button class="submit-btn" @click="acceptConsent()" x-text="T('cookie_ok')"></button>
  </div>
</div>

<!-- PRIVACY POLICY MODAL (footer link) -->
<div class="privacy-overlay" x-show="privacyOpen" x-cloak @click.self="privacyOpen = false">
  <div class="privacy-sheet">
    <h2 x-text="T('privacy_title')"></h2>
    <ul>
      <li x-html="T('privacy_p1')"></li>
      <li x-html="T('privacy_p2')"></li>
      <li x-html="T('privacy_p3')"></li>
      <li x-html="T('privacy_p4')"></li>
    </ul>
    <p class="privacy-footer" x-text="T('privacy_footer')"></p>
    <button class="privacy-close-btn" @click="privacyOpen = false" x-text="T('privacy_close')"></button>
  </div>
</div>

<script src="lang/en.js"></script>
<script src="lang/it.js"></script>
<script src="app.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</body>
</html>
